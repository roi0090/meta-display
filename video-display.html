<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Meta Browser</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d14;
      --bar: #13131e;
      --surface: #1a1a28;
      --border: #2a2a40;
      --accent: #7c6fff;
      --accent2: #b09fff;
      --text: #e8e8f8;
      --muted: #60607a;
      --radius: 12px;
    }

    html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 15px; }

    .browser { display: flex; flex-direction: column; height: 100vh; }

    /* ── Top bar ── */
    .topbar {
      background: var(--bar);
      border-bottom: 1px solid var(--border);
      padding: 10px 12px;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    .nav-btn {
      width: 36px; height: 36px;
      border-radius: 9px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      font-size: 17px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s;
    }
    .nav-btn:active { background: var(--border); }
    .nav-btn:disabled { opacity: 0.3; cursor: default; }

    .url-bar {
      flex: 1;
      display: flex; align-items: center;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 9px;
      padding: 0 12px;
      height: 36px;
      gap: 7px;
      transition: border-color 0.2s;
    }
    .url-bar:focus-within { border-color: var(--accent); }

    .url-input {
      flex: 1; background: none; border: none; outline: none;
      color: var(--text); font-size: 13px;
    }
    .url-input::placeholder { color: var(--muted); }

    .go-btn {
      border: none; background: none;
      color: var(--accent2); font-size: 17px; cursor: pointer; padding: 0;
    }

    /* ── Bookmarks ── */
    .bookmarks {
      background: var(--bar);
      border-bottom: 1px solid var(--border);
      padding: 7px 12px;
      display: flex; align-items: center; gap: 6px;
      overflow-x: auto; flex-shrink: 0;
    }
    .bookmarks::-webkit-scrollbar { display: none; }

    .bm-btn {
      display: flex; align-items: center; gap: 6px;
      padding: 5px 12px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      font-size: 12px; font-weight: 500;
      cursor: pointer; white-space: nowrap; flex-shrink: 0;
      transition: background 0.15s, border-color 0.15s;
    }
    .bm-btn:hover, .bm-btn.active {
      background: #7c6fff20; border-color: var(--accent); color: var(--accent2);
    }
    .bm-btn img { width: 14px; height: 14px; border-radius: 3px; }

    .bm-add {
      width: 28px; height: 28px;
      border-radius: 999px;
      border: 1px dashed var(--border);
      background: none; color: var(--muted);
      font-size: 18px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .bm-add:hover { color: var(--text); border-color: var(--accent); }

    /* ── Content ── */
    .content { flex: 1; position: relative; overflow: hidden; }

    .loading-bar {
      position: absolute; top: 0; left: 0; height: 3px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      width: 0%; transition: width 0.4s; z-index: 5; border-radius: 2px;
    }

    iframe.frame {
      width: 100%; height: 100%; border: none; display: block; background: #fff;
    }

    /* ── Home ── */
    .home {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 28px; padding: 40px 24px;
      background: var(--bg);
    }
    .home.hidden { display: none; }

    .home-logo {
      font-size: 26px; font-weight: 700;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .home-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px; width: 100%; max-width: 480px;
    }

    .home-card {
      display: flex; flex-direction: column; align-items: center;
      gap: 9px; padding: 16px 8px 12px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: var(--surface);
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, transform 0.1s;
    }
    .home-card:hover { background: #7c6fff15; border-color: var(--accent); }
    .home-card:active { transform: scale(0.95); }

    .home-card img {
      width: 40px; height: 40px; border-radius: 10px;
      background: #fff; padding: 3px; object-fit: contain;
    }
    .home-card span {
      font-size: 11px; color: var(--muted);
      text-align: center; white-space: nowrap;
      overflow: hidden; text-overflow: ellipsis; width: 100%;
    }

    /* ── Setup banner ── */
    .setup-banner {
      position: absolute; bottom: 0; left: 0; right: 0;
      background: #ff990020;
      border-top: 1px solid #ff990040;
      padding: 10px 16px;
      display: flex; align-items: center; gap: 12px;
      font-size: 12px; color: #ffbb55;
      z-index: 10;
    }
    .setup-banner.hidden { display: none; }
    .setup-banner a { color: var(--accent2); text-decoration: underline; }
    .setup-banner button {
      margin-left: auto; background: none; border: none;
      color: var(--muted); font-size: 18px; cursor: pointer;
    }

    /* ── Modal ── */
    .overlay { position: fixed; inset: 0; background: #000000b0;
      display: flex; align-items: center; justify-content: center;
      z-index: 100; padding: 20px; }
    .overlay.hidden { display: none; }

    .modal {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 18px; padding: 24px;
      width: 100%; max-width: 360px;
      display: flex; flex-direction: column; gap: 12px;
    }
    .modal h3 { font-size: 16px; font-weight: 700; }

    .modal input {
      width: 100%; background: var(--bg);
      border: 1px solid var(--border); border-radius: 10px;
      padding: 11px 14px; color: var(--text); font-size: 14px; outline: none;
    }
    .modal input:focus { border-color: var(--accent); }
    .modal input::placeholder { color: var(--muted); }

    .modal-btns { display: flex; gap: 8px; justify-content: flex-end; }
    .btn-cancel {
      padding: 9px 16px; border-radius: 10px;
      border: 1px solid var(--border); background: none;
      color: var(--muted); font-size: 13px; cursor: pointer;
    }
    .btn-ok {
      padding: 9px 18px; border-radius: 10px; border: none;
      background: var(--accent); color: #fff;
      font-size: 13px; font-weight: 600; cursor: pointer;
    }
  </style>
</head>
<body>
<div class="browser">

  <div class="topbar">
    <button class="nav-btn" id="backBtn" disabled title="戻る">‹</button>
    <button class="nav-btn" id="fwdBtn"  disabled title="進む">›</button>
    <button class="nav-btn" id="reloadBtn" title="更新">↻</button>
    <div class="url-bar">
      <input class="url-input" id="urlInput" placeholder="URLまたはキーワードを入力..." autocomplete="off" spellcheck="false">
      <button class="go-btn" id="goBtn">→</button>
    </div>
    <button class="nav-btn" id="homeBtn" title="ホーム">⌂</button>
  </div>

  <div class="bookmarks" id="bookmarksBar"></div>

  <div class="content" id="content">
    <div class="loading-bar" id="loadingBar"></div>

    <div class="home" id="homeScreen">
      <div class="home-logo">⬡ Meta Browser</div>
      <div class="home-grid" id="homeGrid"></div>
    </div>

    <iframe class="frame" id="frame" style="display:none"
      allow="autoplay; fullscreen; camera; microphone"
      sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-popups-to-escape-sandbox allow-top-navigation-by-user-activation">
    </iframe>

    <!-- Setup banner: shown until proxy is configured -->
    <div class="setup-banner" id="setupBanner">
      ⚠️ プロキシ未設定のためiFrame表示が機能しない場合があります。
      <a href="#" id="setupLink">プロキシを設定する</a>
      <button id="closeBanner">×</button>
    </div>
  </div>
</div>

<!-- Add bookmark modal -->
<div class="overlay hidden" id="bmOverlay">
  <div class="modal">
    <h3>ブックマーク追加</h3>
    <input id="bmName" placeholder="名前 (例: missai.ai)">
    <input id="bmUrl"  placeholder="URL (例: https://missai.ai)" type="url">
    <div class="modal-btns">
      <button class="btn-cancel" id="bmCancel">キャンセル</button>
      <button class="btn-ok" id="bmSave">追加</button>
    </div>
  </div>
</div>

<!-- Proxy setup modal -->
<div class="overlay hidden" id="proxyOverlay">
  <div class="modal">
    <h3>プロキシURL設定</h3>
    <p style="font-size:12px;color:var(--muted);line-height:1.6">
      Cloudflare WorkerをデプロイしたらそのURLを入力してください。<br>
      例: <code style="color:var(--accent2)">https://meta-proxy.xxx.workers.dev</code>
    </p>
    <input id="proxyInput" placeholder="https://your-worker.workers.dev" type="url">
    <div class="modal-btns">
      <button class="btn-cancel" id="proxyCancel">キャンセル</button>
      <button class="btn-ok" id="proxySave">保存</button>
    </div>
  </div>
</div>

<script>
// ── Config ─────────────────────────────────────────────────────────────────
const BM_KEY    = 'meta_bookmarks_v3';
const PROXY_KEY = 'meta_proxy_url';

const DEFAULTS = [
  { name: 'missai.ai', url: 'https://missai.ai' },
  { name: 'YouTube',   url: 'https://www.youtube.com' },
  { name: 'Google',    url: 'https://www.google.com' },
  { name: 'X',         url: 'https://x.com' },
];

// ── State ──────────────────────────────────────────────────────────────────
let proxyUrl  = localStorage.getItem(PROXY_KEY) || '';
let bookmarks = (() => { try { return JSON.parse(localStorage.getItem(BM_KEY)) || DEFAULTS; } catch { return DEFAULTS; } })();
let navHistory = [], navIndex = -1, currentUrl = null, loadTimer;

// ── DOM ───────────────────────────────────────────────────────────────────
const frame       = document.getElementById('frame');
const urlInput    = document.getElementById('urlInput');
const backBtn     = document.getElementById('backBtn');
const fwdBtn      = document.getElementById('fwdBtn');
const loadingBar  = document.getElementById('loadingBar');
const homeScreen  = document.getElementById('homeScreen');
const setupBanner = document.getElementById('setupBanner');

// ── Proxy ─────────────────────────────────────────────────────────────────
// These domains block proxy/datacenter IPs — skip proxy for them
const NO_PROXY_DOMAINS = [
  'google.com', 'youtube.com', 'youtu.be', 'twitter.com', 'x.com',
  'facebook.com', 'instagram.com', 'netflix.com', 'amazon.com',
];

function needsProxy(url) {
  if (!proxyUrl) return false;
  try {
    const host = new URL(url).hostname.replace('www.', '');
    return !NO_PROXY_DOMAINS.some(d => host === d || host.endsWith('.' + d));
  } catch { return false; }
}

function iframeSrc(url) {
  if (needsProxy(url)) return `${proxyUrl.replace(/\/$/, '')}/?url=${encodeURIComponent(url)}`;
  return url;
}

function faviconFor(url) {
  try { return `https://www.google.com/s2/favicons?domain=${new URL(url).hostname}&sz=64`; }
  catch { return ''; }
}

// ── Banner ────────────────────────────────────────────────────────────────
function updateBanner() {
  setupBanner.classList.toggle('hidden', !!proxyUrl);
}

document.getElementById('closeBanner').addEventListener('click', () => {
  setupBanner.classList.add('hidden');
});

document.getElementById('setupLink').addEventListener('click', (e) => {
  e.preventDefault();
  openProxyModal();
});

// ── Navigate ──────────────────────────────────────────────────────────────
function navigate(url) {
  url = normalise(url);
  if (!url) return;
  navHistory = navHistory.slice(0, navIndex + 1);
  navHistory.push(url);
  navIndex = navHistory.length - 1;
  load(url);
}

function normalise(input) {
  input = (input || '').trim();
  if (!input) return null;
  if (/^https?:\/\//.test(input)) return input;
  if (/^[\w-]+\.\w+/.test(input)) return 'https://' + input;
  return 'https://www.google.com/search?q=' + encodeURIComponent(input);
}

function load(url) {
  currentUrl = url;
  urlInput.value = url;

  homeScreen.classList.add('hidden');
  frame.style.display = 'block';

  startLoading();

  // Clear old load-detect timer
  clearTimeout(loadTimer);

  frame.src = iframeSrc(url);

  updateNavBtns();
  renderBookmarks();
}

function goHome() {
  currentUrl = null;
  urlInput.value = '';
  frame.style.display = 'none';
  frame.src = 'about:blank';
  homeScreen.classList.remove('hidden');
  renderBookmarks();
  updateNavBtns();
}

function updateNavBtns() {
  backBtn.disabled = navIndex <= 0;
  fwdBtn.disabled  = navIndex >= navHistory.length - 1;
}

// ── Loading bar ───────────────────────────────────────────────────────────
function startLoading() {
  loadingBar.style.transition = 'width 0.4s';
  loadingBar.style.width = '50%';
  loadTimer = setTimeout(() => { loadingBar.style.width = '80%'; }, 1000);
}

function finishLoading() {
  clearTimeout(loadTimer);
  loadingBar.style.transition = 'width 0.2s';
  loadingBar.style.width = '100%';
  setTimeout(() => {
    loadingBar.style.transition = 'none';
    loadingBar.style.width = '0%';
  }, 300);
}

frame.addEventListener('load', () => {
  finishLoading();

  // Detect blank (blocked without proxy)
  if (!proxyUrl) {
    try {
      const body = frame.contentDocument?.body?.innerHTML?.trim();
      if (body === '' || body === undefined) {
        showBlockedToast();
      }
    } catch {
      // cross-origin = loaded OK
    }
  }
});

function showBlockedToast() {
  const t = document.createElement('div');
  t.style.cssText = `
    position:fixed; bottom:60px; left:50%; transform:translateX(-50%);
    background:#1e1e2e; border:1px solid #ff990060; color:#ffbb55;
    padding:12px 20px; border-radius:12px; font-size:13px; z-index:99;
    display:flex; align-items:center; gap:12px; white-space:nowrap;
  `;
  t.innerHTML = `⚠️ このサイトはブロックされています。<button style="background:var(--accent);border:none;color:#fff;padding:5px 12px;border-radius:7px;cursor:pointer;font-size:12px" id="_setupNow">プロキシを設定</button>`;
  document.body.appendChild(t);
  t.querySelector('#_setupNow').addEventListener('click', () => { t.remove(); openProxyModal(); });
  setTimeout(() => t.remove?.(), 6000);
}

// ── Bookmarks ─────────────────────────────────────────────────────────────
function saveBookmarks() { localStorage.setItem(BM_KEY, JSON.stringify(bookmarks)); }

function renderBookmarks() {
  const bar = document.getElementById('bookmarksBar');
  bar.innerHTML = '';
  bookmarks.forEach((b) => {
    const btn = document.createElement('button');
    btn.className = 'bm-btn' + (currentUrl === b.url || (proxyUrl && currentUrl === iframeSrc(b.url)) ? ' active' : '');
    btn.innerHTML = `<img src="${faviconFor(b.url)}" onerror="this.style.display='none'"> ${b.name}`;
    btn.addEventListener('click', () => navigate(b.url));
    bar.appendChild(btn);
  });
  const addBtn = document.createElement('button');
  addBtn.className = 'bm-add';
  addBtn.textContent = '+';
  addBtn.addEventListener('click', openBmModal);
  bar.appendChild(addBtn);
}

function renderHomeGrid() {
  const grid = document.getElementById('homeGrid');
  grid.innerHTML = '';
  bookmarks.forEach((b) => {
    const card = document.createElement('div');
    card.className = 'home-card';
    card.innerHTML = `<img src="${faviconFor(b.url)}" onerror="this.outerHTML='<div style=width:40px;height:40px;font-size:28px;display:flex;align-items:center;justify-content:center>🌐</div>'"><span>${b.name}</span>`;
    card.addEventListener('click', () => navigate(b.url));
    grid.appendChild(card);
  });
}

// ── Controls ──────────────────────────────────────────────────────────────
backBtn.addEventListener('click', () => {
  if (navIndex > 0) { navIndex--; load(navHistory[navIndex]); }
});
fwdBtn.addEventListener('click', () => {
  if (navIndex < navHistory.length - 1) { navIndex++; load(navHistory[navIndex]); }
});
document.getElementById('reloadBtn').addEventListener('click', () => { if (currentUrl) load(currentUrl); });
document.getElementById('homeBtn').addEventListener('click', goHome);
document.getElementById('goBtn').addEventListener('click', () => navigate(urlInput.value));
urlInput.addEventListener('keydown', e => { if (e.key === 'Enter') navigate(urlInput.value); });

// ── Bookmark modal ────────────────────────────────────────────────────────
function openBmModal() {
  document.getElementById('bmName').value = '';
  document.getElementById('bmUrl').value = currentUrl || '';
  document.getElementById('bmOverlay').classList.remove('hidden');
  document.getElementById('bmName').focus();
}
document.getElementById('bmCancel').addEventListener('click', () => document.getElementById('bmOverlay').classList.add('hidden'));
document.getElementById('bmSave').addEventListener('click', () => {
  const name = document.getElementById('bmName').value.trim();
  let url = document.getElementById('bmUrl').value.trim();
  if (!name || !url) return;
  if (!/^https?:\/\//.test(url)) url = 'https://' + url;
  bookmarks.push({ name, url });
  saveBookmarks(); renderBookmarks(); renderHomeGrid();
  document.getElementById('bmOverlay').classList.add('hidden');
});

// ── Proxy modal ───────────────────────────────────────────────────────────
function openProxyModal() {
  document.getElementById('proxyInput').value = proxyUrl;
  document.getElementById('proxyOverlay').classList.remove('hidden');
}
document.getElementById('proxyCancel').addEventListener('click', () => document.getElementById('proxyOverlay').classList.add('hidden'));
document.getElementById('proxySave').addEventListener('click', () => {
  let val = document.getElementById('proxyInput').value.trim();
  if (val && !/^https?:\/\//.test(val)) val = 'https://' + val;
  proxyUrl = val;
  localStorage.setItem(PROXY_KEY, proxyUrl);
  updateBanner();
  document.getElementById('proxyOverlay').classList.add('hidden');
  if (currentUrl) load(currentUrl); // reload with proxy
});

// Close modals on backdrop click
['bmOverlay','proxyOverlay'].forEach(id => {
  document.getElementById(id).addEventListener('click', e => {
    if (e.target.id === id) document.getElementById(id).classList.add('hidden');
  });
});

// ── Init ──────────────────────────────────────────────────────────────────
updateBanner();
renderBookmarks();
renderHomeGrid();
</script>
</body>
</html>

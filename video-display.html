<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Meta Browser</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d14;
      --surface: #16161f;
      --surface2: #1e1e2e;
      --border: #2a2a3e;
      --accent: #7c6fff;
      --accent2: #b09fff;
      --text: #e8e8f8;
      --muted: #5a5a78;
      --radius: 16px;
    }

    html, body {
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    /* ── Header ── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 14px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .logo {
      font-size: 17px;
      font-weight: 700;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      flex-shrink: 0;
    }

    /* URL bar */
    .url-form {
      flex: 1;
      display: flex;
      align-items: center;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 0 14px;
      height: 42px;
      gap: 8px;
      transition: border-color 0.2s;
    }

    .url-form:focus-within { border-color: var(--accent); }

    .url-form input {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      color: var(--text);
      font-size: 14px;
    }

    .url-form input::placeholder { color: var(--muted); }

    .go-btn {
      background: var(--accent);
      border: none;
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      padding: 6px 14px;
      border-radius: 8px;
      cursor: pointer;
      white-space: nowrap;
    }

    /* ── Main ── */
    main {
      padding: 28px 20px 40px;
      max-width: 700px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 32px;
    }

    section h2 {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 14px;
    }

    /* ── Site grid ── */
    .site-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
    }

    @media (max-width: 480px) {
      .site-grid { grid-template-columns: repeat(3, 1fr); }
    }

    .site-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      padding: 18px 10px 14px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: var(--surface);
      cursor: pointer;
      text-decoration: none;
      color: var(--text);
      transition: background 0.15s, border-color 0.15s, transform 0.1s;
      position: relative;
    }

    .site-card:active { transform: scale(0.96); }

    .site-card:hover {
      background: var(--surface2);
      border-color: var(--accent);
    }

    .site-icon {
      width: 48px;
      height: 48px;
      border-radius: 12px;
      background: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .site-icon img {
      width: 36px;
      height: 36px;
      object-fit: contain;
    }

    .site-icon-emoji {
      font-size: 28px;
    }

    .site-name {
      font-size: 12px;
      font-weight: 500;
      text-align: center;
      word-break: break-word;
      line-height: 1.3;
      color: var(--text);
    }

    /* delete button */
    .delete-btn {
      position: absolute;
      top: 6px;
      right: 6px;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: #ff4f6d;
      border: none;
      color: #fff;
      font-size: 12px;
      line-height: 1;
      cursor: pointer;
      display: none;
      align-items: center;
      justify-content: center;
    }

    .edit-mode .delete-btn { display: flex; }

    /* Add card */
    .add-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      padding: 18px 10px 14px;
      border-radius: var(--radius);
      border: 2px dashed var(--border);
      background: none;
      cursor: pointer;
      transition: border-color 0.15s;
    }

    .add-card:hover { border-color: var(--accent); }

    .add-icon {
      width: 48px;
      height: 48px;
      border-radius: 12px;
      background: var(--surface2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      color: var(--muted);
    }

    .add-label {
      font-size: 12px;
      color: var(--muted);
    }

    /* Edit mode toggle */
    .edit-toggle {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 5px 12px;
      border-radius: 8px;
      font-size: 12px;
      cursor: pointer;
      float: right;
      transition: color 0.15s, border-color 0.15s;
    }

    .edit-toggle:hover,
    .edit-toggle.active { color: var(--accent2); border-color: var(--accent); }

    /* ── History ── */
    .history-list {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .history-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 11px 14px;
      border-radius: 10px;
      background: var(--surface);
      border: 1px solid var(--border);
      cursor: pointer;
      text-decoration: none;
      color: var(--text);
      transition: background 0.15s;
    }

    .history-item:hover { background: var(--surface2); }

    .history-favicon {
      width: 20px;
      height: 20px;
      border-radius: 5px;
      object-fit: contain;
      background: #fff;
      flex-shrink: 0;
    }

    .history-url {
      flex: 1;
      font-size: 13px;
      color: var(--text);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .history-time {
      font-size: 11px;
      color: var(--muted);
      flex-shrink: 0;
    }

    .history-del {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 16px;
      padding: 2px 6px;
      border-radius: 4px;
      transition: color 0.15s;
    }

    .history-del:hover { color: #ff4f6d; }

    .empty-msg {
      text-align: center;
      color: var(--muted);
      font-size: 13px;
      padding: 20px 0;
    }

    /* ── Modal ── */
    .overlay {
      position: fixed;
      inset: 0;
      background: #000000b0;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      padding: 20px;
    }

    .overlay.hidden { display: none; }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 24px;
      width: 100%;
      max-width: 360px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .modal h3 { font-size: 16px; font-weight: 700; }

    .modal input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 11px 14px;
      color: var(--text);
      font-size: 14px;
      outline: none;
    }

    .modal input:focus { border-color: var(--accent); }
    .modal input::placeholder { color: var(--muted); }

    .modal-btns {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
    }

    .btn-cancel {
      padding: 10px 18px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: none;
      color: var(--muted);
      font-size: 14px;
      cursor: pointer;
    }

    .btn-add {
      padding: 10px 18px;
      border-radius: 10px;
      border: none;
      background: var(--accent);
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
  </style>
</head>
<body>

<header>
  <div class="logo">⬡ Meta</div>
  <form class="url-form" id="urlForm">
    <input id="urlInput" type="url" placeholder="URLを入力して移動..." autocomplete="off" spellcheck="false">
    <button class="go-btn" type="submit">移動</button>
  </form>
</header>

<main>
  <section>
    <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:14px;">
      <h2 style="margin-bottom:0">サイト</h2>
      <button class="edit-toggle" id="editToggle">編集</button>
    </div>
    <div class="site-grid" id="siteGrid"></div>
  </section>

  <section>
    <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:14px;">
      <h2 style="margin-bottom:0">履歴</h2>
      <button class="edit-toggle" id="clearHistory" style="float:none">全削除</button>
    </div>
    <div class="history-list" id="historyList"></div>
  </section>
</main>

<!-- Add site modal -->
<div class="overlay hidden" id="overlay">
  <div class="modal">
    <h3>サイトを追加</h3>
    <input id="mName" placeholder="名前 (例: YouTube)" />
    <input id="mUrl"  placeholder="URL (例: https://youtube.com)" type="url" />
    <div class="modal-btns">
      <button class="btn-cancel" id="mCancel">キャンセル</button>
      <button class="btn-add"    id="mSave">追加</button>
    </div>
  </div>
</div>

<script>
const SITES_KEY   = 'meta_sites_v2';
const HISTORY_KEY = 'meta_history_v2';

const DEFAULTS = [
  { name: 'missai.ai', url: 'https://missai.ai' },
  { name: 'YouTube',   url: 'https://www.youtube.com' },
  { name: 'Google',    url: 'https://www.google.com' },
  { name: 'X',         url: 'https://x.com' },
  { name: 'Instagram', url: 'https://www.instagram.com' },
  { name: 'ChatGPT',   url: 'https://chat.openai.com' },
];

// ── Storage ────────────────────────────────────────────────────────────────
function loadSites() {
  try { return JSON.parse(localStorage.getItem(SITES_KEY)) || DEFAULTS; }
  catch { return DEFAULTS; }
}

function saveSites(s) { localStorage.setItem(SITES_KEY, JSON.stringify(s)); }

function loadHistory() {
  try { return JSON.parse(localStorage.getItem(HISTORY_KEY)) || []; }
  catch { return []; }
}

function saveHistory(h) { localStorage.setItem(HISTORY_KEY, JSON.stringify(h)); }

// ── Favicon ────────────────────────────────────────────────────────────────
function faviconUrl(siteUrl) {
  try { return `https://www.google.com/s2/favicons?domain=${new URL(siteUrl).hostname}&sz=64`; }
  catch { return ''; }
}

// ── Navigate ───────────────────────────────────────────────────────────────
function go(url) {
  if (!url) return;
  if (!/^https?:\/\//.test(url)) url = 'https://' + url;

  // Save to history
  let hist = loadHistory().filter(h => h.url !== url);
  hist.unshift({ url, ts: Date.now() });
  if (hist.length > 30) hist = hist.slice(0, 30);
  saveHistory(hist);

  window.location.href = url;
}

// ── Edit mode ──────────────────────────────────────────────────────────────
let editMode = false;

document.getElementById('editToggle').addEventListener('click', () => {
  editMode = !editMode;
  document.getElementById('editToggle').classList.toggle('active', editMode);
  document.getElementById('editToggle').textContent = editMode ? '完了' : '編集';
  document.getElementById('siteGrid').classList.toggle('edit-mode', editMode);
});

// ── Render sites ───────────────────────────────────────────────────────────
function renderSites() {
  const sites = loadSites();
  const grid = document.getElementById('siteGrid');
  grid.innerHTML = '';

  sites.forEach((s, i) => {
    const card = document.createElement('div');
    card.className = 'site-card';
    card.innerHTML = `
      <div class="site-icon">
        <img src="${faviconUrl(s.url)}" width="36" height="36"
          onerror="this.parentNode.innerHTML='<span class=site-icon-emoji>🌐</span>'">
      </div>
      <div class="site-name">${s.name}</div>
      <button class="delete-btn" data-i="${i}" title="削除">×</button>
    `;
    card.addEventListener('click', (e) => {
      if (e.target.closest('.delete-btn')) return;
      if (editMode) return;
      go(s.url);
    });
    card.querySelector('.delete-btn').addEventListener('click', (e) => {
      e.stopPropagation();
      const sites = loadSites();
      sites.splice(i, 1);
      saveSites(sites);
      renderSites();
    });
    grid.appendChild(card);
  });

  // Add button
  const addCard = document.createElement('div');
  addCard.className = 'add-card';
  addCard.innerHTML = `
    <div class="add-icon">+</div>
    <div class="add-label">追加</div>
  `;
  addCard.addEventListener('click', openModal);
  grid.appendChild(addCard);
}

// ── Render history ─────────────────────────────────────────────────────────
function renderHistory() {
  const hist = loadHistory();
  const list = document.getElementById('historyList');

  if (hist.length === 0) {
    list.innerHTML = '<div class="empty-msg">履歴はありません</div>';
    return;
  }

  list.innerHTML = hist.map((h, i) => `
    <div class="history-item" data-url="${encodeURIComponent(h.url)}">
      <img class="history-favicon" src="${faviconUrl(h.url)}"
        onerror="this.style.display='none'">
      <span class="history-url">${h.url}</span>
      <span class="history-time">${fmtTime(h.ts)}</span>
      <button class="history-del" data-i="${i}" title="削除">×</button>
    </div>
  `).join('');

  list.querySelectorAll('.history-item').forEach(el => {
    el.addEventListener('click', (e) => {
      if (e.target.closest('.history-del')) return;
      go(decodeURIComponent(el.dataset.url));
    });
  });

  list.querySelectorAll('.history-del').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      const hist = loadHistory();
      hist.splice(Number(btn.dataset.i), 1);
      saveHistory(hist);
      renderHistory();
    });
  });
}

document.getElementById('clearHistory').addEventListener('click', () => {
  if (confirm('履歴をすべて削除しますか？')) {
    saveHistory([]);
    renderHistory();
  }
});

function fmtTime(ts) {
  const d = new Date(ts), now = new Date();
  if (d.toDateString() === now.toDateString())
    return d.toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit' });
  return d.toLocaleDateString('ja-JP', { month: 'short', day: 'numeric' });
}

// ── Modal ─────────────────────────────────────────────────────────────────
const overlay = document.getElementById('overlay');
const mName = document.getElementById('mName');
const mUrl  = document.getElementById('mUrl');

function openModal() {
  mName.value = '';
  mUrl.value = '';
  overlay.classList.remove('hidden');
  setTimeout(() => mName.focus(), 100);
}

document.getElementById('mCancel').addEventListener('click', () => overlay.classList.add('hidden'));
overlay.addEventListener('click', e => { if (e.target === overlay) overlay.classList.add('hidden'); });

document.getElementById('mSave').addEventListener('click', () => {
  const name = mName.value.trim();
  let url = mUrl.value.trim();
  if (!name || !url) return;
  if (!/^https?:\/\//.test(url)) url = 'https://' + url;
  const sites = loadSites();
  sites.push({ name, url });
  saveSites(sites);
  renderSites();
  overlay.classList.add('hidden');
});

// ── URL bar ───────────────────────────────────────────────────────────────
document.getElementById('urlForm').addEventListener('submit', (e) => {
  e.preventDefault();
  let val = document.getElementById('urlInput').value.trim();
  if (!val) return;
  // If it doesn't look like a URL, treat as Google search
  if (!/^https?:\/\//.test(val) && !val.includes('.')) {
    val = 'https://www.google.com/search?q=' + encodeURIComponent(val);
  }
  go(val);
});

// ── Init ──────────────────────────────────────────────────────────────────
renderSites();
renderHistory();
</script>
</body>
</html>

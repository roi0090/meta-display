<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Meta Browser</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d14;
      --bar: #13131e;
      --surface: #1a1a28;
      --border: #2a2a40;
      --accent: #7c6fff;
      --accent2: #b09fff;
      --text: #e8e8f8;
      --muted: #60607a;
      --radius: 12px;
    }

    html, body {
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 15px;
      user-select: none;
      -webkit-user-select: none;
    }

    .browser {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    /* ── Top Bar ── */
    .topbar {
      background: var(--bar);
      border-bottom: 1px solid var(--border);
      padding: 10px 14px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
      z-index: 10;
    }

    .nav-btn {
      width: 38px;
      height: 38px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      font-size: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s;
    }

    .nav-btn:active { background: var(--border); }
    .nav-btn:disabled { opacity: 0.3; cursor: default; }

    .url-bar {
      flex: 1;
      display: flex;
      align-items: center;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0 14px;
      gap: 8px;
      height: 38px;
      transition: border-color 0.2s;
    }

    .url-bar:focus-within {
      border-color: var(--accent);
    }

    .url-icon {
      font-size: 13px;
      color: var(--muted);
      flex-shrink: 0;
    }

    .url-input {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      color: var(--text);
      font-size: 14px;
    }

    .url-input::placeholder { color: var(--muted); }

    .go-btn {
      border: none;
      background: none;
      color: var(--accent2);
      font-size: 18px;
      cursor: pointer;
      padding: 0;
      line-height: 1;
    }

    /* ── Bookmarks Bar ── */
    .bookmarks-bar {
      background: var(--bar);
      border-bottom: 1px solid var(--border);
      padding: 8px 14px;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }

    .bookmarks-bar::-webkit-scrollbar { display: none; }

    .bookmark-btn {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 6px 14px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
      transition: background 0.15s, border-color 0.15s;
    }

    .bookmark-btn:hover,
    .bookmark-btn.active {
      background: #7c6fff20;
      border-color: var(--accent);
      color: var(--accent2);
    }

    .bookmark-btn .favicon {
      width: 16px;
      height: 16px;
      border-radius: 4px;
      object-fit: contain;
    }

    .add-bookmark-btn {
      width: 30px;
      height: 30px;
      border-radius: 999px;
      border: 1px dashed var(--border);
      background: none;
      color: var(--muted);
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: color 0.15s, border-color 0.15s;
    }

    .add-bookmark-btn:hover { color: var(--text); border-color: var(--accent); }

    /* ── Content Area ── */
    .content {
      flex: 1;
      position: relative;
      overflow: hidden;
    }

    .frame {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
      background: #fff;
    }

    /* ── Home Screen ── */
    .home {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 32px;
      padding: 40px 20px;
      background: var(--bg);
    }

    .home.hidden { display: none; }

    .home-logo {
      font-size: 28px;
      font-weight: 700;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.5px;
    }

    .home-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      width: 100%;
      max-width: 500px;
    }

    .home-icon {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      padding: 16px 8px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: var(--surface);
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }

    .home-icon:hover {
      background: #7c6fff15;
      border-color: var(--accent);
    }

    .home-icon .icon-img {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      object-fit: contain;
      background: #fff;
      padding: 4px;
    }

    .home-icon .icon-emoji {
      font-size: 32px;
      line-height: 40px;
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .home-icon span {
      font-size: 11px;
      color: var(--muted);
      text-align: center;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      width: 100%;
    }

    /* ── Blocked overlay ── */
    .blocked {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      background: var(--bg);
      text-align: center;
      padding: 40px;
    }

    .blocked.hidden { display: none; }

    .blocked-icon { font-size: 48px; }
    .blocked-title { font-size: 18px; font-weight: 600; }
    .blocked-msg { font-size: 13px; color: var(--muted); line-height: 1.6; }

    .open-new-tab-btn {
      padding: 10px 24px;
      border-radius: var(--radius);
      border: none;
      background: var(--accent);
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }

    /* ── Loading indicator ── */
    .loading-bar {
      position: absolute;
      top: 0;
      left: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      border-radius: 1px;
      width: 0%;
      transition: width 0.3s;
      z-index: 5;
    }

    /* ── Add bookmark modal ── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: #00000090;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      padding: 20px;
    }

    .modal-overlay.hidden { display: none; }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px;
      width: 100%;
      max-width: 360px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .modal-title {
      font-size: 16px;
      font-weight: 700;
    }

    .modal input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 14px;
      color: var(--text);
      font-size: 14px;
      outline: none;
    }

    .modal input:focus { border-color: var(--accent); }
    .modal input::placeholder { color: var(--muted); }

    .modal-actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
    }

    .modal-cancel {
      padding: 9px 18px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: none;
      color: var(--muted);
      font-size: 14px;
      cursor: pointer;
    }

    .modal-save {
      padding: 9px 18px;
      border-radius: 10px;
      border: none;
      background: var(--accent);
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
  </style>
</head>
<body>
<div class="browser">

  <!-- Top nav bar -->
  <div class="topbar">
    <button class="nav-btn" id="backBtn" title="戻る" disabled>‹</button>
    <button class="nav-btn" id="fwdBtn"  title="進む" disabled>›</button>
    <button class="nav-btn" id="reloadBtn" title="更新">↻</button>
    <div class="url-bar">
      <span class="url-icon">🔒</span>
      <input class="url-input" id="urlInput" type="url"
        placeholder="URLまたはサイト名を入力..."
        autocomplete="off" spellcheck="false">
      <button class="go-btn" id="goBtn">→</button>
    </div>
    <button class="nav-btn" id="homeBtn" title="ホーム">⌂</button>
  </div>

  <!-- Bookmarks bar -->
  <div class="bookmarks-bar" id="bookmarksBar"></div>

  <!-- Content -->
  <div class="content" id="content">
    <div class="loading-bar" id="loadingBar"></div>

    <!-- Home screen -->
    <div class="home" id="homeScreen">
      <div class="home-logo">⬡ Meta Browser</div>
      <div class="home-grid" id="homeGrid"></div>
    </div>

    <!-- Blocked screen -->
    <div class="blocked hidden" id="blockedScreen">
      <div class="blocked-icon">🚫</div>
      <div class="blocked-title">表示できませんでした</div>
      <div class="blocked-msg" id="blockedMsg">このサイトはiFrame内での表示を<br>ブロックしています。</div>
      <button class="open-new-tab-btn" id="openNewTabBtn">新しいタブで開く</button>
    </div>

    <!-- Browser iframe -->
    <iframe class="frame hidden" id="frame" sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-popups-to-escape-sandbox allow-presentation allow-top-navigation-by-user-activation" allow="autoplay; fullscreen; camera; microphone; payment"></iframe>
  </div>
</div>

<!-- Add bookmark modal -->
<div class="modal-overlay hidden" id="modalOverlay">
  <div class="modal">
    <div class="modal-title">ブックマークを追加</div>
    <input id="modalName" placeholder="名前 (例: Google)" />
    <input id="modalUrl"  placeholder="URL (例: https://google.com)" type="url" />
    <div class="modal-actions">
      <button class="modal-cancel" id="modalCancel">キャンセル</button>
      <button class="modal-save"   id="modalSave">追加</button>
    </div>
  </div>
</div>

<script>
// ── Default bookmarks ────────────────────────────────────────────────────
const DEFAULT_BOOKMARKS = [
  { name: 'missai.ai', url: 'https://missai.ai',        favicon: 'https://missai.ai/favicon.ico' },
  { name: 'YouTube',   url: 'https://www.youtube.com',  favicon: 'https://www.youtube.com/favicon.ico' },
  { name: 'Google',    url: 'https://www.google.com',   favicon: 'https://www.google.com/favicon.ico' },
  { name: 'X (Twitter)',url:'https://x.com',            favicon: 'https://x.com/favicon.ico' },
];

const STORAGE_KEY = 'meta_browser_bookmarks';

function loadBookmarks() {
  try {
    const stored = localStorage.getItem(STORAGE_KEY);
    return stored ? JSON.parse(stored) : DEFAULT_BOOKMARKS;
  } catch { return DEFAULT_BOOKMARKS; }
}

function saveBookmarks(list) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(list));
}

// ── State ────────────────────────────────────────────────────────────────
let bookmarks = loadBookmarks();
let currentUrl = null;
let history = [];
let historyIndex = -1;
let loadTimer = null;
let blockedUrl = null;

// ── DOM refs ──────────────────────────────────────────────────────────────
const frame        = document.getElementById('frame');
const urlInput     = document.getElementById('urlInput');
const backBtn      = document.getElementById('backBtn');
const fwdBtn       = document.getElementById('fwdBtn');
const reloadBtn    = document.getElementById('reloadBtn');
const homeBtn      = document.getElementById('homeBtn');
const goBtn        = document.getElementById('goBtn');
const homeScreen   = document.getElementById('homeScreen');
const blockedScreen= document.getElementById('blockedScreen');
const blockedMsg   = document.getElementById('blockedMsg');
const loadingBar   = document.getElementById('loadingBar');
const bookmarksBar = document.getElementById('bookmarksBar');
const homeGrid     = document.getElementById('homeGrid');

// ── Rendering ─────────────────────────────────────────────────────────────
function renderBookmarksBar() {
  bookmarksBar.innerHTML = '';
  bookmarks.forEach((b, i) => {
    const btn = document.createElement('button');
    btn.className = 'bookmark-btn' + (currentUrl === b.url ? ' active' : '');
    btn.innerHTML = `<img class="favicon" src="${b.favicon}" onerror="this.style.display='none'"> ${b.name}`;
    btn.addEventListener('click', () => navigate(b.url));
    bookmarksBar.appendChild(btn);
  });
  // Add button
  const addBtn = document.createElement('button');
  addBtn.className = 'add-bookmark-btn';
  addBtn.title = 'ブックマークを追加';
  addBtn.textContent = '+';
  addBtn.addEventListener('click', openModal);
  bookmarksBar.appendChild(addBtn);
}

function renderHomeGrid() {
  homeGrid.innerHTML = '';
  bookmarks.forEach((b) => {
    const el = document.createElement('div');
    el.className = 'home-icon';
    el.innerHTML = `
      <img class="icon-img" src="${b.favicon}" onerror="this.outerHTML='<div class=\\'icon-emoji\\'>🌐</div>'">
      <span>${b.name}</span>
    `;
    el.addEventListener('click', () => navigate(b.url));
    homeGrid.appendChild(el);
  });
}

// ── Navigation ────────────────────────────────────────────────────────────
function normalizeUrl(input) {
  input = input.trim();
  if (!input) return null;
  if (input.startsWith('http://') || input.startsWith('https://')) return input;
  // looks like domain
  if (/^[\w-]+\.\w+/.test(input)) return 'https://' + input;
  // treat as Google search
  return 'https://www.google.com/search?q=' + encodeURIComponent(input);
}

function navigate(url) {
  if (!url) return;
  url = normalizeUrl(url);
  if (!url) return;

  // trim forward history
  history = history.slice(0, historyIndex + 1);
  history.push(url);
  historyIndex = history.length - 1;

  load(url);
}

function load(url) {
  currentUrl = url;
  urlInput.value = url;

  // show loading
  startLoading();

  // hide home & blocked, show frame
  homeScreen.classList.add('hidden');
  blockedScreen.classList.add('hidden');
  frame.classList.remove('hidden');

  // Update icon based on https
  document.querySelector('.url-icon').textContent = url.startsWith('https') ? '🔒' : '🔓';

  // Set iframe src
  frame.src = url;

  updateNavBtns();
  renderBookmarksBar();
}

function startLoading() {
  clearTimeout(loadTimer);
  loadingBar.style.width = '40%';
  loadTimer = setTimeout(() => { loadingBar.style.width = '80%'; }, 800);
}

function finishLoading() {
  clearTimeout(loadTimer);
  loadingBar.style.width = '100%';
  setTimeout(() => { loadingBar.style.width = '0%'; }, 400);
}

function goHome() {
  currentUrl = null;
  urlInput.value = '';
  frame.src = 'about:blank';
  frame.classList.add('hidden');
  blockedScreen.classList.add('hidden');
  homeScreen.classList.remove('hidden');
  renderBookmarksBar();
  renderHomeGrid();
}

function updateNavBtns() {
  backBtn.disabled = historyIndex <= 0;
  fwdBtn.disabled  = historyIndex >= history.length - 1;
}

// ── iframe events ─────────────────────────────────────────────────────────
frame.addEventListener('load', () => {
  finishLoading();
  // Try to detect blocked (about:blank means it may have been blocked)
  try {
    const loc = frame.contentWindow.location.href;
    if (loc === 'about:blank' && currentUrl && currentUrl !== 'about:blank') {
      showBlocked(currentUrl);
    }
  } catch(e) {
    // cross-origin: that's fine, site is loaded
    finishLoading();
  }
});

frame.addEventListener('error', () => {
  finishLoading();
  showBlocked(currentUrl);
});

function showBlocked(url) {
  blockedUrl = url;
  frame.classList.add('hidden');
  blockedScreen.classList.remove('hidden');
  finishLoading();
}

document.getElementById('openNewTabBtn').addEventListener('click', () => {
  if (blockedUrl) window.open(blockedUrl, '_blank');
});

// ── Controls ──────────────────────────────────────────────────────────────
backBtn.addEventListener('click', () => {
  if (historyIndex > 0) {
    historyIndex--;
    load(history[historyIndex]);
  }
});

fwdBtn.addEventListener('click', () => {
  if (historyIndex < history.length - 1) {
    historyIndex++;
    load(history[historyIndex]);
  }
});

reloadBtn.addEventListener('click', () => {
  if (currentUrl) load(currentUrl);
});

homeBtn.addEventListener('click', goHome);

goBtn.addEventListener('click', () => navigate(urlInput.value));

urlInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') navigate(urlInput.value);
});

// ── Add Bookmark Modal ────────────────────────────────────────────────────
const modalOverlay = document.getElementById('modalOverlay');
const modalName    = document.getElementById('modalName');
const modalUrl     = document.getElementById('modalUrl');

function openModal() {
  // Pre-fill with current page if any
  if (currentUrl) {
    modalUrl.value = currentUrl;
    try {
      modalName.value = new URL(currentUrl).hostname.replace('www.', '');
    } catch {}
  } else {
    modalUrl.value = '';
    modalName.value = '';
  }
  modalOverlay.classList.remove('hidden');
  modalName.focus();
}

document.getElementById('modalCancel').addEventListener('click', () => {
  modalOverlay.classList.add('hidden');
});

document.getElementById('modalSave').addEventListener('click', () => {
  const name = modalName.value.trim();
  let url = modalUrl.value.trim();
  if (!name || !url) return;
  if (!/^https?:\/\//.test(url)) url = 'https://' + url;
  const favicon = `https://${new URL(url).hostname}/favicon.ico`;
  bookmarks.push({ name, url, favicon });
  saveBookmarks(bookmarks);
  renderBookmarksBar();
  renderHomeGrid();
  modalOverlay.classList.add('hidden');
});

modalOverlay.addEventListener('click', (e) => {
  if (e.target === modalOverlay) modalOverlay.classList.add('hidden');
});

// ── Init ──────────────────────────────────────────────────────────────────
renderBookmarksBar();
renderHomeGrid();
</script>
</body>
</html>
